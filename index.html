<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 2026 Affiliate Launchpad | Free System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-3xl w-full text-center">
        <div class="inline-block px-4 py-1.5 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-xs font-bold uppercase tracking-widest mb-8">
            Limited Release: The "Copy-Paste" System
        </div>
        <h1 class="text-5xl md:text-7xl font-800 tracking-tighter mb-8 leading-tight">
            Stop Building Funnels. <br><span class="text-blue-500">Copy Mine Instead.</span>
        </h1>
        <p class="text-slate-400 text-xl mb-12 max-w-xl mx-auto">
            Get my entire 2026 Lead Gen System, my high-converting email swipes, and the exact website you're looking at right now—100% Free.
        </p>

        <form id="captureForm" class="glass p-3 rounded-2xl flex flex-col md:flex-row gap-3">
            <input type="email" id="emailInput" placeholder="Where should I send the Launchpad?" required 
                   class="flex-1 bg-transparent p-4 rounded-xl text-white outline-none border border-white/10 focus:border-blue-500 transition">
            <button type="submit" id="submitBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-bold transition shadow-lg shadow-blue-600/20">
                Get Instant Access →
            </button>
        </form>
        <p class="mt-6 text-slate-500 text-sm italic">Join 1,200+ affiliates scaling with this exact setup.</p>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzjc9zDLt3_Q1k9jIj8KVYcVcSPMOSqA9ExSouj5RI40YuFipGLGkk5tWc-RIM1uh83-A/exec"; 
        document.getElementById('captureForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.innerText = "Provisioning...";
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ email: document.getElementById('emailInput').value, source: "Launchpad_LP" })})
            .finally(() => { 
                // Redirect to the High-Energy Sales Page (Site B)
                window.location.href = "/sales.html?src=launchpad_lead"; 
            });
        });
    </script>
</body>
</html>
